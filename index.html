<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobil FPS - 3D Model Floresanlı Tam Kod</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05050a;
            position: fixed;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* --- MOBİL KONTROL ARAYÜZÜ (UI) --- */
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.05s linear;
        }
        #jump-button {
            position: absolute;
            bottom: 60px;
            right: 40px;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: white;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #jump-button:active {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>
    <div id="jump-button">ZIPLA</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // 1. SAHNE VE KAMERA KURULUMU
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        const eyeHeight = 30; 
        camera.position.set(0, eyeHeight, 30); 
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // 2. DOKU YÜKLEYİCİ
        const textureLoader = new THREE.TextureLoader();
        const wallTex = textureLoader.load('yirtik_duvar.jpg');
        const floorTex = textureLoader.load('.trashed-1784090761-images (1) (2).jpeg');

        // 3. GENEL ORTAM IŞIĞI
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.04); 
        scene.add(ambientLight);

        // 4. KABARTMALI ZEMIN
        const floorSize = 150;
        const floorGeo = new THREE.PlaneGeometry(floorSize, floorSize, 200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ 
            map: floorTex,
            displacementMap: floorTex, 
            displacementScale: 6.0,    
            displacementBias: -0.5,
            roughness: 0.85 
        });
        floorGeo.computeVertexNormals();
        
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        floor.castShadow = true;
        scene.add(floor);

        // 5. KABARTMALI DUVARLAR
        const wallHeight = 90; 
        const wallGeo = new THREE.PlaneGeometry(floorSize, wallHeight, 200, 120); 
        const wallMat = new THREE.MeshStandardMaterial({
            map: wallTex,
            displacementMap: wallTex,
            displacementScale: 9.0,
            displacementBias: -1.0,
            roughness: 0.9
        });
        wallGeo.computeVertexNormals();

        // Arka Duvar
        const backWall = new THREE.Mesh(wallGeo, wallMat);
        backWall.position.set(0, wallHeight / 2, -floorSize / 2);
        backWall.castShadow = true; backWall.receiveShadow = true;
        scene.add(backWall);

        // Ön Duvar
        const frontWall = new THREE.Mesh(wallGeo, wallMat);
        frontWall.position.set(0, wallHeight / 2, floorSize / 2);
        frontWall.rotation.y = Math.PI;
        frontWall.castShadow = true; frontWall.receiveShadow = true;
        scene.add(frontWall);

        // Sol Duvar
        const leftWall = new THREE.Mesh(wallGeo, wallMat);
        leftWall.position.set(-floorSize / 2, wallHeight / 2, 0);
        leftWall.rotation.y = Math.PI / 2;
        leftWall.castShadow = true; leftWall.receiveShadow = true;
        scene.add(leftWall);

        // Sağ Duvar
        const rightWall = new THREE.Mesh(wallGeo, wallMat);
        rightWall.position.set(floorSize / 2, wallHeight / 2, 0);
        rightWall.rotation.y = -Math.PI / 2;
        rightWall.castShadow = true; rightWall.receiveShadow = true;
        scene.add(rightWall);

        // ÇATI / TAVAN (Zemin gibi yüksek kabartmalı)
        const ceilingGeo = new THREE.PlaneGeometry(floorSize, floorSize, 200, 200);
        const ceilingMat = new THREE.MeshStandardMaterial({ 
            map: floorTex,
            displacementMap: floorTex,
            displacementScale: 6.0,
            displacementBias: -0.5,
            roughness: 0.85 
        });
        ceilingGeo.computeVertexNormals();
        const ceiling = new THREE.Mesh(ceilingGeo, ceilingMat);
        ceiling.position.y = wallHeight;
        ceiling.rotation.x = Math.PI / 2; 
        ceiling.receiveShadow = true;
        scene.add(ceiling);


        // 6. [YENİ] 3D MODEL FLORESAN LAMBA YÜKLEME ALANI
        const lampGroup = new THREE.Group();

        // Gerçekçi nokta ışık kaynağı
        const fluorescentLight = new THREE.PointLight(0xecf3ff, 1.4, 250);
        fluorescentLight.position.set(0, -1, 2); 
        fluorescentLight.castShadow = true;
        fluorescentLight.shadow.mapSize.width = 1024;
        fluorescentLight.shadow.mapSize.height = 1024;
        fluorescentLight.shadow.bias = -0.002;
        lampGroup.add(fluorescentLight);

        // GLTF Yükleyici entegrasyonu
        const gltfLoader = new THREE.GLTFLoader();
        
        // Hata almamak için aynı klasördeki 'floresan_lamba.glb' dosyasını yükler
        gltfLoader.load('weathered_fluorescent_lightlamp_-_4096px2.glb', (gltf) => {
            const model = gltf.scene;
            
            // Model boyutunu buradan ölçekleyebilirsin (Küçük boylu istendiği için ufak tutuldu)
            model.scale.set(4, 4, 4); 
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    
                    // Modelin içindeki parlayan tüp kısmına otomatik 'emissive' gücü verir
                    if (child.name.toLowerCase().includes("tup") || child.name.toLowerCase().includes("glass") || child.material.color.r > 0.8) {
                        child.material.emissive = new THREE.Color(0xffffff);
                        child.material.emissiveIntensity = 6.0; 
                    }
                }
            });

            lampGroup.add(model);
        }, 
        (xhr) => { console.log((xhr.loaded / xhr.total * 100) + '% yüklendi'); },
        (error) => { console.error('3D Model yüklenirken hata oluştu! Klasör yolunu veya sunucuyu kontrol edin.', error); });

        // Arka duvarda, küçük boylu konumlandırma (Z = -73.5)
        lampGroup.position.set(0, 55, -73.5); 
        scene.add(lampGroup);


        // 7. BUMP-KABARTMALI VE BİRLEŞİK KOLTUK (DUVARA YAPIŞIK)
        const couchGroup = new THREE.Group();
        const couchMat = new THREE.MeshStandardMaterial({
            map: wallTex,
            bumpMap: wallTex,    
            bumpScale: 1.2,      
            roughness: 0.75
        });

        const seatGeo = new THREE.BoxGeometry(38, 6, 20);
        const seat = new THREE.Mesh(seatGeo, couchMat);
        seat.position.set(0, 3, 0); 
        seat.castShadow = true; seat.receiveShadow = true;
        couchGroup.add(seat);

        const backrestGeo = new THREE.BoxGeometry(38, 16, 6);
        const backrest = new THREE.Mesh(backrestGeo, couchMat);
        backrest.position.set(0, 11, -7); 
        backrest.castShadow = true; backrest.receiveShadow = true;
        couchGroup.add(backrest);

        const leftArmGeo = new THREE.BoxGeometry(6, 12, 26);
        const leftArm = new THREE.Mesh(leftArmGeo, couchMat);
        leftArm.position.set(-19, 6, 0); 
        leftArm.castShadow = true; leftArm.receiveShadow = true;
        couchGroup.add(leftArm);

        const rightArmGeo = new THREE.BoxGeometry(6, 12, 26);
        const rightArm = new THREE.Mesh(rightArmGeo, couchMat);
        rightArm.position.set(19, 6, 0); 
        rightArm.castShadow = true; rightArm.receiveShadow = true;
        couchGroup.add(rightArm);

        couchGroup.position.set(0, 0, -62);
        scene.add(couchGroup);

        // 8. MOBİL DOKUNMATİK KONTROL MANTIĞI
        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        const jumpButton = document.getElementById('jump-button');

        let joystickPos = { x: 0, y: 0 };
        let joystickActive = false;
        let joystickTouchId = null;

        let lookTouchId = null;
        let prevLookX = 0, prevLookY = 0;
        let yaw = 0, pitch = 0;

        const velocity = new THREE.Vector3();
        let canJump = false;
        let prevTime = performance.now();

        window.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                if (touch.target === jumpButton) {
                    if (canJump) {
                        velocity.y += 130; 
                        canJump = false;
                    }
                    continue;
                }
                let rect = joystickZone.getBoundingClientRect();
                if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
                    touch.clientY >= rect.top && touch.clientY <= rect.bottom && !joystickActive) {
                    joystickActive = true;
                    joystickTouchId = touch.identifier;
                    updateJoystick(touch, rect);
                    continue;
                }
                if (lookTouchId === null) {
                    lookTouchId = touch.identifier;
                    prevLookX = touch.clientX;
                    prevLookY = touch.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                if (joystickActive && touch.identifier === joystickTouchId) {
                    let rect = joystickZone.getBoundingClientRect();
                    updateJoystick(touch, rect);
                }
                if (touch.identifier === lookTouchId) {
                    let deltaX = touch.clientX - prevLookX;
                    let deltaY = touch.clientY - prevLookY;
                    yaw -= deltaX * 0.006;
                    pitch -= deltaY * 0.006;
                    pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
                    prevLookX = touch.clientX;
                    prevLookY = touch.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                if (joystickActive && touch.identifier === joystickTouchId) {
                    joystickActive = false;
                    joystickTouchId = null;
                    joystickPos = { x: 0, y: 0 };
                    joystickKnob.style.transform = `translate(0px, 0px)`;
                }
                if (touch.identifier === lookTouchId) lookTouchId = null;
            }
        });

        function updateJoystick(touch, rect) {
            let centerX = rect.left + rect.width / 2;
            let centerY = rect.top + rect.height / 2;
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            let distance = Math.sqrt(dx * dx + dy * dy);
            let maxRadius = rect.width / 2;
            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }
            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            joystickPos.x = dx / maxRadius;
            joystickPos.y = dy / maxRadius;
        }

        // 9. ANİMASYON VE HAREKET/ÇARPIŞMA DÖNGÜSÜ
        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            camera.rotation.x = pitch;
            camera.rotation.y = yaw;

            velocity.x -= velocity.x * 12.0 * delta;
            velocity.z -= velocity.z * 12.0 * delta;
            velocity.y -= 9.8 * 35.0 * delta; 

            if (joystickActive) {
                const forwardX = -Math.sin(yaw);
                const forwardZ = -Math.cos(yaw);
                const rightX = Math.cos(yaw);
                const rightZ = -Math.sin(yaw);
                
                let moveX = (forwardX * -joystickPos.y) + (rightX * joystickPos.x);
                let moveZ = (forwardZ * -joystickPos.y) + (rightZ * joystickPos.x);
                
                velocity.x += moveX * 380.0 * delta;
                velocity.z += moveZ * 380.0 * delta;
            }

            camera.position.x += velocity.x * delta;
            camera.position.z += velocity.z * delta;
            camera.position.y += velocity.y * delta;

            if (camera.position.y < eyeHeight) {
                velocity.y = 0;
                camera.position.y = eyeHeight;
                canJump = true;
            }
            if (camera.position.y > wallHeight - 5) {
                camera.position.y = wallHeight - 5;
                velocity.y = 0;
            }

            // KOLTUK ÇARPIŞMA SİSTEMİ
            const cMinX = -25, cMaxX = 25;
            const cMinZ = -75, cMaxZ = -45;

            if (camera.position.x > cMinX && camera.position.x < cMaxX &&
                camera.position.z > cMinZ && camera.position.z < cMaxZ) {
                
                const distToLeft = Math.abs(camera.position.x - cMinX);
                const distToRight = Math.abs(camera.position.x - cMaxX);
                const distToFront = Math.abs(camera.position.z - cMaxZ);

                const minDist = Math.min(distToLeft, distToRight, distToFront);

                if (minDist === distToFront) {
                    camera.position.z = cMaxZ;
                    velocity.z = 0;
                } else if (minDist === distToLeft) {
                    camera.position.x = cMinX;
                    velocity.x = 0;
                } else {
                    camera.position.x = cMaxX;
                    velocity.x = 0;
                }
            }

            // Oda Duvar Sınırları
            const boundary = (floorSize / 2) - 6;
            if (camera.position.x > boundary) camera.position.x = boundary;
            if (camera.position.x < -boundary) camera.position.x = -boundary;
            if (camera.position.z > boundary) camera.position.z = boundary;
            if (camera.position.z < -boundary) camera.position.z = -boundary;

            prevTime = time;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
